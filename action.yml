name: Mirror Repo
description: >-
  Force-push branches from the current repo to a mirror repository using an
  SSH deploy key. Self-contained: checks out full history, loads the key,
  and pushes. Standardized, hardened replacement for per-repo sync workflows.

inputs:
  target-repo:
    description: "SSH URL of the mirror repo, e.g. git@github.com:owner/repo.git"
    required: true
  ssh-private-key:
    description: >-
      SSH private key whose public half is added as a write deploy key on the
      mirror repo. Pass the repo's existing SSH secret from the caller workflow.
    required: true
  sync-branches:
    description: >-
      Space-separated source branches or source:target mappings to sync (e.g.
      'main staging' or 'dev:main staging:preview').
    required: false
    default: main
  exclude-paths:
    description: >-
      Space-separated paths to remove from the mirrored tree before pushing.
      When set, the action creates a synthetic mirror commit on top of the
      target branch instead of pushing the source commit directly.
    required: false
  git-user-name:
    description: >-
      Git committer name for the empty sync commit. Leave both this and
      git-user-email empty to skip the commit and mirror branches as-is.
    required: false
  git-user-email:
    description: >-
      Git committer email for the empty sync commit. Leave both this and
      git-user-name empty to skip the commit and mirror branches as-is.
    required: false

runs:
  using: composite
  steps:
    - name: Checkout (full history)
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Load mirror deploy key
      uses: webfactory/ssh-agent@v0.10.0
      with:
        ssh-private-key: ${{ inputs.ssh-private-key }}

    - name: Trust GitHub SSH host
      shell: bash
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan github.com >> ~/.ssh/known_hosts

    - name: Verify source objects
      shell: bash
      run: git fsck --no-dangling

    - name: Configure git identity
      if: inputs.git-user-name != '' && inputs.git-user-email != ''
      shell: bash
      env:
        GIT_USER_NAME: ${{ inputs.git-user-name }}
        GIT_USER_EMAIL: ${{ inputs.git-user-email }}
      run: |
        git config user.name "$GIT_USER_NAME"
        git config user.email "$GIT_USER_EMAIL"

    - name: Add mirror remote
      shell: bash
      env:
        TARGET_REPO: ${{ inputs.target-repo }}
      run: git remote add mirror "$TARGET_REPO"

    - name: Validate branch mappings
      shell: bash
      env:
        SYNC_BRANCHES: ${{ inputs.sync-branches }}
      run: |
        set -euo pipefail
        for spec in $SYNC_BRANCHES; do
          case "$spec" in
            *:*:*) echo "invalid sync-branches entry '$spec': expected source or source:target"; exit 1 ;;
            *:*) source="${spec%%:*}"; target="${spec#*:}" ;;
            *) source="$spec"; target="$spec" ;;
          esac
          if [ -z "$source" ] || [ -z "$target" ]; then
            echo "invalid sync-branches entry '$spec': source and target are required"; exit 1
          fi
          git check-ref-format --branch "$source" >/dev/null
          git check-ref-format --branch "$target" >/dev/null
          echo "ok: $source -> $target"
        done

    - name: Sync branches to mirror
      shell: bash
      env:
        SYNC_BRANCHES: ${{ inputs.sync-branches }}
        EXCLUDE_PATHS: ${{ inputs.exclude-paths }}
        DO_COMMIT: ${{ inputs.git-user-name != '' && inputs.git-user-email != '' }}
      run: |
        set -euo pipefail
        for spec in $SYNC_BRANCHES; do
          case "$spec" in
            *:*) source="${spec%%:*}"; target="${spec#*:}" ;;
            *) source="$spec"; target="$spec" ;;
          esac
          echo "Checking out $source from origin"
          git checkout -B __mirror_push "refs/remotes/origin/$source"
          push_ref="HEAD"

          if [ -n "${EXCLUDE_PATHS// /}" ]; then
            echo "Excluding paths from mirror: $EXCLUDE_PATHS"
            git fetch mirror "refs/heads/$target:refs/remotes/mirror/$target" || true
            git rm -r --ignore-unmatch -- $EXCLUDE_PATHS
            tree="$(git write-tree)"
            parent_args=()
            if git rev-parse --verify "refs/remotes/mirror/$target" >/dev/null 2>&1; then
              parent_args=(-p "refs/remotes/mirror/$target")
            fi
            if ! git config user.name >/dev/null || ! git config user.email >/dev/null; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            fi
            push_ref="$(printf 'chore: prepare mirror\n' | git commit-tree "$tree" "${parent_args[@]}")"
          fi

          if [ "$DO_COMMIT" = "true" ]; then
            git checkout -B __mirror_push "$push_ref"
            echo "Empty sync commit on $source"
            git commit --allow-empty -m "chore: sync"
            push_ref="HEAD"
          fi

          echo "Pushing $source -> mirror/$target"
          git push mirror "$push_ref:refs/heads/$target" --force --no-thin
        done
